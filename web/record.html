      <header class="site-header">
        <button class="menu-toggle" type="button" aria-label="Открыть меню" aria-expanded="false" aria-controls="main-navigation">
          <span class="menu-icon" aria-hidden="true"><span></span><span></span><span></span></span>

        <nav class="main-navigation" id="main-navigation" aria-label="Главная навигация">

      <main class="record-page" id="record-page">
        <section class="record-identity" id="record-content" hidden>
          <div class="record-heading">
            <p class="record-code"><span id="record-id"></span> / <span id="record-kind"></span></p>
            <h1 id="record-name"></h1>
            <p class="record-alias" id="record-alias"></p>
          </div>
          <figure class="record-portrait">
            <img id="record-image" src="" alt="" />
            <figcaption><span id="record-image-id"></span> / DOCUMENTARY IMAGE</figcaption>
          </figure>
        </section>

        <section class="record-overview" id="record-overview" hidden>
          <div class="record-summary">
            <span class="section-index">КРАТКОЕ ОПИСАНИЕ</span>
            <p id="record-summary"></p>
          </div>
          <dl class="record-fields" id="record-fields"></dl>
        </section>

        <section class="record-lore" id="record-lore" hidden>
          <div class="section-heading record-section-heading">
            <span class="section-index">ПОЛНЫЙ ЛОР</span>
          </div>
          <div id="record-sections"></div>
        </section>

        <section class="record-empty" id="record-empty" hidden>
          <p class="record-code">RECORD / NOT FOUND</p>
          <h1>ЗАПИСЬ НЕ НАЙДЕНА</h1>
          <p>Такого идентификатора пока нет в локальном реестре.</p>
