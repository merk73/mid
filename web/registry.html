      <main id="catalog-top">
        <div class="record-toolbar catalog-toolbar toolbar-status-only">
          <span id="catalog-count">0000 ЗАПИСЕЙ</span>
        </div>

        <section class="catalog-hero">
          <span class="section-index" id="catalog-code">DIRECTORY / 00</span>
          <div>
            <h1 id="catalog-title">РЕЕСТР</h1>
            <p id="catalog-description"></p>
          </div>
        </section>

        <section class="catalog-controls" id="catalog-controls">
          <div class="catalog-search-wrap">
            <label for="catalog-search">ПОИСК ПО РЕЕСТРУ</label>
            <div class="catalog-search-field">
              <input id="catalog-search" type="search" inputmode="search" autocomplete="off" placeholder="Имя, псевдоним или номер досье" />
              <button type="button" id="catalog-search-clear" aria-label="Очистить поиск" hidden>×</button>
            </div>
          </div>
          <div class="catalog-control-row">
            <div class="filters" id="catalog-filters" aria-label="Фильтр записей"></div>
            <label class="catalog-sort">СОРТИРОВКА
              <select id="catalog-sort">
                <option value="id">ПО НОМЕРУ</option>
                <option value="name">ПО НАЗВАНИЮ</option>
                <option value="updated">СНАЧАЛА НОВЫЕ</option>
              </select>
            </label>
            <div class="catalog-view" aria-label="Вид реестра">
              <button type="button" data-catalog-view="grid" aria-label="Показать карточками" title="Карточки" class="is-active"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="6" height="6" /><rect x="14" y="4" width="6" height="6" /><rect x="4" y="14" width="6" height="6" /><rect x="14" y="14" width="6" height="6" /></svg></button>
              <button type="button" data-catalog-view="list" aria-label="Показать списком" title="Список"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="6" r="1" /><path d="M9 6h11" /><circle cx="5" cy="12" r="1" /><path d="M9 12h11" /><circle cx="5" cy="18" r="1" /><path d="M9 18h11" /></svg></button>
            </div>
          </div>
        </section>

        <section class="catalog-results" aria-live="polite">
          <div class="catalog-results-meta"><span id="catalog-visible-count">ПОКАЗАНО: 0000</span><button type="button" id="catalog-reset" hidden>СБРОСИТЬ ФИЛЬТРЫ</button></div>
          <div class="client-grid registry-grid" id="registry-grid"></div>
          <div class="catalog-empty" id="catalog-empty" hidden>ПО ЗАДАННЫМ УСЛОВИЯМ НИЧЕГО НЕ НАЙДЕНО.</div>
        </section>
      </main>

      <footer class="site-footer">
        <span>THE MIDGAS © 2026</span>

        <a href="changelog.html">ЖУРНАЛ ОБНОВЛЕНИЙ</a>
